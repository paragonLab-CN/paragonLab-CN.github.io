<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>典范实验室 - Paragon Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.7;
        }
        .navbar {
            background-color: #1a1a1a;
            color: white;
            padding: 18px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            width: 92%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-title {
            font-size: 22px;
            font-weight: 600;
        }
        .nav-links {
            display: flex;
            gap: 24px;
        }
        .nav-links a {
            color: #eee;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #fff;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 35px;
            margin: 35px 0;
            box-shadow: 0 4px 18px rgba(0,0,0,0.05);
            text-align: center;
        }
        .lab-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .lab-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }
        .lab-title {
            font-size: 28px;
            font-weight: 700;
            color: #222;
        }
        .desc {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<div class="navbar">
    <div class="container nav-inner">
        <div class="nav-title">Paragon Lab | 典范实验室</div>
        <div class="nav-links">
            <a href="members.html" target="_blank">实验室成员</a>
            <a href="projects.html" target="_blank">当前项目</a>
        </div>
    </div>
</div>

<!-- 主页内容 -->
<div class="container">
    <div class="card">
        <div class="lab-header">
            <img src="labLogo.png" alt="Paragon Lab Logo" class="lab-logo">
            <div class="lab-title">典范实验室</div>
        </div>
        <p class="desc">专注于自动驾驶、多模态感知、机器人、医疗影像仿真研究</p>
    </div>
</div>

</body>
</html>
