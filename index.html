<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>典范实验室 - Paragon Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.7;
        }

        /* 顶部导航栏 */
        .navbar {
            background-color: #1a1a1a;
            color: white;
            padding: 18px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .nav-title {
            font-size: 24px;
            font-weight: 600;
        }

        /* 主体内容卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 35px;
            margin: 35px 0;
            box-shadow: 0 4px 18px rgba(0,0,0,0.05);
        }

        /* 实验室标题 */
        .lab-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .lab-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 8px;
        }

        .lab-title {
            font-size: 28px;
            font-weight: 700;
            color: #222;
        }

        /* 信息行 */
        .info-row {
            font-size: 16px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .label {
            font-weight: 600;
            min-width: 70px;
            color: #222;
        }

        /* 项目区域 */
        .project-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }

        .project-item {
            margin-bottom: 18px;
        }

        .project-name {
            font-size: 15px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #f1f1f1;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: #3273dc;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .card {
                padding: 22px;
            }
            .lab-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- 顶部导航 -->
    <div class="navbar">
        <div class="container">
            <div class="nav-title">Paragon Lab | 典范实验室</div>
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <div class="card">
            <!-- 实验室 Logo + 名称 -->
            <div class="lab-header">
                <img src="labLogo.png" alt="Paragon Lab Logo" class="lab-logo">
                <div class="lab-title">典范实验室</div>
            </div>

            <!-- 成员信息 -->
            <div class="info-row">
                <span class="label">核心成员：</span>
                <span>段金利、朱志穆、李柯欣、杨锦豪</span>
            </div>

            <div class="info-row">
                <span class="label">实习成员：</span>
                <span>哈力木拉提（北京航空航天大学）、汪涌泉（武汉大学）</span>
            </div>

            <div class="info-row">
                <span class="label">合作方：</span>
                <span>胡淙夏（地表动力科技）、章吕天阳（重庆大学）、Le zhang（伯明翰大学）</span>
            </div>

            <!-- 项目进度 -->
            <div class="project-section">
                <div class="section-title">当前论文项目立项与进展</div>

                <div class="project-item">
                    <div class="project-name">1. 自动驾驶+具身多模态VLM数据分析</div>
                    <div class="progress-bar">
                        <div class="progress" style="width: 80%"></div>
                    </div>
                </div>

                <div class="project-item">
                    <div class="project-name">2. 感知多目标追踪</div>
                    <div class="progress-bar">
                        <div class="progress" style="width: 78%"></div>
                    </div>
                </div>

                <div class="project-item">
                    <div class="project-name">3. 地表动力机器人项目</div>
                    <div class="progress-bar">
                        <div class="progress" style="width: 43%"></div>
                    </div>
                </div>

                <div class="project-item">
                    <div class="project-name">4. 世界模型*医疗影像仿真项目</div>
                    <div class="progress-bar">
                        <div class="progress" style="width: 30%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
